AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >-
  ita-ms1-ingress upload-init service.

Parameters:
  # ProcessingBucketName:
  #   Type: String
  #   Description: Shared processing bucket name for upload targets.
  SharedInfraStackName:
    Type: String
    Description: Stack name of the shared infra deployment that exports shared runtime values.
  SharedPasswordSsmParameterName:
    Type: String
    Description: SSM parameter name containing shared class password.
  # Ms4InternalApiBaseUrl:
  #   Type: String
  #   Description: Base URL for MS4 internal API.
  StateMgrStackName:
    Type: String
    Description: Stack name of the MS4 state manager deployment that exports its API endpoint.
  PresignExpiresSeconds:
    Type: Number
    Default: 900
    MinValue: 60
    MaxValue: 3600
    Description: Expiration time (seconds) for presigned PUT URL.
  PublicInitThrottleRateLimit:
    Type: Number
    Default: 30
    Description: Requests per second limit for public POST /v1/uploads/init.
  PublicInitThrottleBurstLimit:
    Type: Number
    Default: 60
    Description: Burst request limit for public POST /v1/uploads/init.

Globals:
  Function:
    Runtime: python3.12
    Timeout: 10
    MemorySize: 128
    Architectures:
      - x86_64
    Environment:
      Variables:
        LOG_LEVEL: INFO
        SERVICE_NAME: ms1-ingress

Resources:
  IngressApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: "$default"
      RouteSettings:
        "POST /v1/uploads/init":
          ThrottlingRateLimit: !Ref PublicInitThrottleRateLimit
          ThrottlingBurstLimit: !Ref PublicInitThrottleBurstLimit
      CorsConfiguration:
        AllowOrigins:
          - http://localhost:5173
          - http://127.0.0.1:5173
          # - https://ita.dosomelearning.com
          - !ImportValue
              Fn::Sub: "${SharedInfraStackName}-SpaAllowedOrigin"
        AllowMethods:
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type

  IngressFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-ingress-handler"
      CodeUri: src/
      Handler: main.handler
      Environment:
        Variables:
          SHARED_PASSWORD_SSM_PARAM: !Ref SharedPasswordSsmParameterName
          # PROCESSING_BUCKET_NAME: !Ref ProcessingBucketName
          PROCESSING_BUCKET_NAME: !ImportValue
            Fn::Sub: "${SharedInfraStackName}-SharedProcessingBucketName"
          # MS4_INTERNAL_API_BASE_URL: !Ref Ms4InternalApiBaseUrl
          MS4_INTERNAL_API_BASE_URL: !ImportValue
            Fn::Sub: "${StateMgrStackName}-ApiEndpoint"
          PRESIGN_EXPIRES_SECONDS: !Ref PresignExpiresSeconds
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${SharedPasswordSsmParameterName}"
        - Statement:
            - Effect: Allow
              Action:
                - s3:PutObject
              # Resource: !Sub "arn:aws:s3:::${ProcessingBucketName}/uploaded/*"
              Resource: !Sub
                - "arn:aws:s3:::${ImportedProcessingBucketName}/uploaded/*"
                - ImportedProcessingBucketName: !ImportValue
                    Fn::Sub: "${SharedInfraStackName}-SharedProcessingBucketName"
        - Statement:
            - Effect: Allow
              Action:
                - execute-api:Invoke
              Resource:
                - !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:*/*/POST/internal/uploads/init"
                - !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:*/*/POST/internal/uploads/*/events"
      Events:
        UploadInit:
          Type: HttpApi
          Properties:
            ApiId: !Ref IngressApi
            Path: /v1/uploads/init
            Method: POST

Outputs:
  ApiEndpoint:
    Description: API endpoint for ms1-ingress.
    Value: !Sub "https://${IngressApi}.execute-api.${AWS::Region}.amazonaws.com"
    Export:
      Name: !Sub "${AWS::StackName}-ApiEndpoint"

  FunctionArn:
    Description: Lambda ARN for ms1-ingress.
    Value: !GetAtt IngressFunction.Arn

  FunctionName:
    Description: Lambda name for ms1-ingress.
    Value: !Ref IngressFunction
