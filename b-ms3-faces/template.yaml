AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >-
  ita-ms3-faces extraction worker service.

Parameters:
  # ProcessingBucketName:
  #   Type: String
  #   Default: "ita-data-pxuzz47kqx"
  #   Description: Shared processing bucket containing uploaded images and extraction artifacts.
  # FacesExtractionQueueArn:
  #   Type: String
  #   Default: "arn:aws:sqs:eu-central-1:186388857715:ita-faces-extraction-pxuzz47kqx"
  #   Description: ARN of faces extraction SQS queue consumed by MS3.
  # Ms4InternalApiBaseUrl:
  #   Type: String
  #   Default: "https://90zby48wa9.execute-api.eu-central-1.amazonaws.com"
  #   Description: Base URL for MS4 internal API.
  SharedInfraStackName:
    Type: String
    Description: Stack name of the shared infra deployment that exports shared runtime values.
  StateMgrStackName:
    Type: String
    Description: Stack name of the MS4 state manager deployment that exports its API endpoint.

Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 256
    Architectures:
      - x86_64
    Environment:
      Variables:
        LOG_LEVEL: INFO
        SERVICE_NAME: ms3-faces

Resources:
  FacesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-faces-handler"
      CodeUri: src/
      Handler: main.handler
      Environment:
        Variables:
          # PROCESSING_BUCKET_NAME: !Ref ProcessingBucketName
          PROCESSING_BUCKET_NAME: !ImportValue
            Fn::Sub: "${SharedInfraStackName}-SharedProcessingBucketName"
          # MS4_INTERNAL_API_BASE_URL: !Ref Ms4InternalApiBaseUrl
          MS4_INTERNAL_API_BASE_URL: !ImportValue
            Fn::Sub: "${StateMgrStackName}-ApiEndpoint"
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - sqs:ReceiveMessage
                - sqs:DeleteMessage
                - sqs:GetQueueAttributes
              # Resource: !Ref FacesExtractionQueueArn
              Resource: !ImportValue
                Fn::Sub: "${SharedInfraStackName}-FacesExtractionQueueArn"
            - Effect: Allow
              Action:
                - s3:GetObject
              Resource:
                # - !Sub "arn:aws:s3:::${ProcessingBucketName}/processed/faces/*"
                # - !Sub "arn:aws:s3:::${ProcessingBucketName}/rekognition/*"
                - !Sub
                    - "arn:aws:s3:::${ImportedProcessingBucketName}/processed/faces/*"
                    - ImportedProcessingBucketName: !ImportValue
                        Fn::Sub: "${SharedInfraStackName}-SharedProcessingBucketName"
                - !Sub
                    - "arn:aws:s3:::${ImportedProcessingBucketName}/rekognition/*"
                    - ImportedProcessingBucketName: !ImportValue
                        Fn::Sub: "${SharedInfraStackName}-SharedProcessingBucketName"
            - Effect: Allow
              Action:
                - s3:PutObject
              # Resource: !Sub "arn:aws:s3:::${ProcessingBucketName}/faces/*"
              Resource: !Sub
                - "arn:aws:s3:::${ImportedProcessingBucketName}/faces/*"
                - ImportedProcessingBucketName: !ImportValue
                    Fn::Sub: "${SharedInfraStackName}-SharedProcessingBucketName"
            - Effect: Allow
              Action:
                - execute-api:Invoke
              Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:*/*/POST/internal/uploads/*/events"
      Events:
        FacesExtractionQueue:
          Type: SQS
          Properties:
            # Queue: !Ref FacesExtractionQueueArn
            Queue: !ImportValue
              Fn::Sub: "${SharedInfraStackName}-FacesExtractionQueueArn"
            BatchSize: 1
            MaximumBatchingWindowInSeconds: 0

Outputs:
  FunctionArn:
    Description: Lambda ARN for ms3-faces.
    Value: !GetAtt FacesFunction.Arn

  FunctionName:
    Description: Lambda name for ms3-faces.
    Value: !Ref FacesFunction
