AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >-
  ita-ms4-statemgr state manager service.

Parameters:
  CloudFrontDomain:
    Type: String
    Default: "ita.dosomelearning.com"
    Description: "CloudFront domain used for frontend-facing artifact URLs."

Globals:
  Function:
    Runtime: python3.12
    Timeout: 10
    MemorySize: 128
    Architectures:
      - x86_64
    Environment:
      Variables:
        LOG_LEVEL: INFO
        SERVICE_NAME: ms4-statemgr

Resources:
  StateMgrApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: "$default"
      Auth:
        EnableIamAuthorizer: true
      CorsConfiguration:
        AllowOrigins:
          - http://localhost:5173
          - http://127.0.0.1:5173
          - https://ita.dosomelearning.com
        AllowMethods:
          - GET
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization

  StateTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: gsi1pk
          AttributeType: S
        - AttributeName: gsi1sk
          AttributeType: S
        - AttributeName: gsi2pk
          AttributeType: S
        - AttributeName: gsi2sk
          AttributeType: S
        - AttributeName: gsi3pk
          AttributeType: S
        - AttributeName: gsi3sk
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: gsi1pk
              KeyType: HASH
            - AttributeName: gsi1sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI2
          KeySchema:
            - AttributeName: gsi2pk
              KeyType: HASH
            - AttributeName: gsi2sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI3
          KeySchema:
            - AttributeName: gsi3pk
              KeyType: HASH
            - AttributeName: gsi3sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  StateMgrFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-statemgr-handler"
      CodeUri: src/
      Handler: main.handler
      Environment:
        Variables:
          STATE_TABLE_NAME: !Ref StateTable
          CLOUDFRONT_DOMAIN: !Ref CloudFrontDomain
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref StateTable
      Events:
        InternalInit:
          Type: HttpApi
          Properties:
            ApiId: !Ref StateMgrApi
            Path: /internal/uploads/init
            Method: POST
            Auth:
              Authorizer: AWS_IAM
        InternalEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref StateMgrApi
            Path: /internal/uploads/{uploadId}/events
            Method: POST
            Auth:
              Authorizer: AWS_IAM
        PublicStatus:
          Type: HttpApi
          Properties:
            ApiId: !Ref StateMgrApi
            Path: /v1/uploads/{uploadId}/status
            Method: GET
        PublicParticipantUploads:
          Type: HttpApi
          Properties:
            ApiId: !Ref StateMgrApi
            Path: /v1/sessions/{sessionId}/participants/{nickname}/uploads
            Method: GET
        PublicSessionActivities:
          Type: HttpApi
          Properties:
            ApiId: !Ref StateMgrApi
            Path: /v1/sessions/{sessionId}/activities
            Method: GET

Outputs:
  ApiEndpoint:
    Description: API endpoint for ms4-statemgr.
    Value: !Sub "https://${StateMgrApi}.execute-api.${AWS::Region}.amazonaws.com"

  FunctionArn:
    Description: Lambda ARN for ms4-statemgr.
    Value: !GetAtt StateMgrFunction.Arn

  FunctionName:
    Description: Lambda name for ms4-statemgr.
    Value: !Ref StateMgrFunction

  StateTableName:
    Description: DynamoDB table name for ms4-statemgr state and events.
    Value: !Ref StateTable
