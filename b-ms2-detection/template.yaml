AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >-
  ita-ms2-detection detection worker service.

Parameters:
  ProcessingBucketName:
    Type: String
    Default: "ita-data-pxuzz47kqx"
    Description: Shared processing bucket containing uploaded images and detection artifacts.
  UploadedPhotosQueueArn:
    Type: String
    Default: "arn:aws:sqs:eu-central-1:186388857715:ita-uploaded-photos-pxuzz47kqx"
    Description: ARN of uploaded photos SQS queue consumed by MS2.
  FacesExtractionQueueArn:
    Type: String
    Default: "arn:aws:sqs:eu-central-1:186388857715:ita-faces-extraction-pxuzz47kqx"
    Description: ARN of faces extraction SQS queue used by MS2 producer path.
  FacesExtractionQueueUrl:
    Type: String
    Default: "https://sqs.eu-central-1.amazonaws.com/186388857715/ita-faces-extraction-pxuzz47kqx"
    Description: URL of faces extraction SQS queue used by MS2 producer path.
  Ms4InternalApiBaseUrl:
    Type: String
    Default: "https://90zby48wa9.execute-api.eu-central-1.amazonaws.com"
    Description: Base URL for MS4 internal API.

Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 256
    Architectures:
      - x86_64
    Environment:
      Variables:
        LOG_LEVEL: INFO
        SERVICE_NAME: ms2-detection

Resources:
  DetectionFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-detection-handler"
      CodeUri: src/
      Handler: main.handler
      Environment:
        Variables:
          PROCESSING_BUCKET_NAME: !Ref ProcessingBucketName
          FACES_EXTRACTION_QUEUE_URL: !Ref FacesExtractionQueueUrl
          MS4_INTERNAL_API_BASE_URL: !Ref Ms4InternalApiBaseUrl
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - sqs:ReceiveMessage
                - sqs:DeleteMessage
                - sqs:GetQueueAttributes
              Resource: !Ref UploadedPhotosQueueArn
            - Effect: Allow
              Action:
                - sqs:SendMessage
              Resource: !Ref FacesExtractionQueueArn
            - Effect: Allow
              Action:
                - s3:GetObject
              Resource: !Sub "arn:aws:s3:::${ProcessingBucketName}/uploaded/*"
            - Effect: Allow
              Action:
                - s3:PutObject
              Resource: !Sub "arn:aws:s3:::${ProcessingBucketName}/processed/*"
            - Effect: Allow
              Action:
                - s3:DeleteObject
              Resource: !Sub "arn:aws:s3:::${ProcessingBucketName}/uploaded/*"
            - Effect: Allow
              Action:
                - s3:PutObject
              Resource: !Sub "arn:aws:s3:::${ProcessingBucketName}/rekognition/*"
            - Effect: Allow
              Action:
                - rekognition:DetectFaces
              Resource: "*"
            - Effect: Allow
              Action:
                - execute-api:Invoke
              Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:*/*/POST/internal/uploads/*/events"
      Events:
        UploadedPhotoQueue:
          Type: SQS
          Properties:
            Queue: !Ref UploadedPhotosQueueArn
            BatchSize: 1
            MaximumBatchingWindowInSeconds: 0

Outputs:
  FunctionArn:
    Description: Lambda ARN for ms2-detection.
    Value: !GetAtt DetectionFunction.Arn

  FunctionName:
    Description: Lambda name for ms2-detection.
    Value: !Ref DetectionFunction
